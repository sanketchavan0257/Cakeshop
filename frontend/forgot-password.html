<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - CakeCraft</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="animation: fadeUp 0.5s ease-out">
      <h1 class="logo" style="font-size:1.75rem" data-testid="forgot-password-heading">Reset Password</h1>
      <p class="subtitle" id="subtitle-text">Enter your email to receive a password reset link</p>

      <!-- Form state -->
      <div id="form-state">
        <form id="forgot-form" data-testid="forgot-password-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="form-input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input type="email" id="email" class="form-input" required placeholder="admin@cakeshop.com" data-testid="email-input">
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="submit-btn" data-testid="submit-button">
            Send Reset Link
          </button>
        </form>
      </div>

      <!-- Success state -->
      <div id="success-state" class="hidden">
        <div class="info-box success">
          <p>Password reset email sent successfully!</p>
          <p class="small">Please check your email and click the reset link.</p>
        </div>
        <div class="info-box neutral hidden" id="reset-link-box">
          <p class="small"><strong>Demo Mode:</strong> Reset link (in production, this would be sent via email):</p>
          <a href="#" id="reset-link-display" data-testid="reset-link" target="_blank"></a>
        </div>
      </div>

      <a href="/login.html" class="auth-link" data-testid="back-to-login">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Back to Login
      </a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('forgot-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const email = document.getElementById('email').value;

        if (!email) {
          showToast('Please enter your email', 'error');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
          const data = await apiCall('/auth/forgot-password', {
            method: 'POST',
            body: { email },
          });

          showToast('Password reset link sent to your email!', 'success');
          document.getElementById('form-state').classList.add('hidden');
          document.getElementById('success-state').classList.remove('hidden');
          document.getElementById('subtitle-text').textContent = 'Check your email for reset instructions';

          if (data.reset_link) {
            const linkBox = document.getElementById('reset-link-box');
            const linkDisplay = document.getElementById('reset-link-display');
            linkBox.classList.remove('hidden');
            linkDisplay.href = data.reset_link;
            linkDisplay.textContent = data.reset_link;
          }
        } catch (err) {
          const msg = err.message;
          if (msg.includes('Invalid email') || msg.includes('not registered')) {
            showToast('Invalid email ID. This email is not registered.', 'error');
          } else {
            showToast(msg || 'Failed to send reset link', 'error');
          }
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
        }
      });
    });
  </script>
</body>
</html>
