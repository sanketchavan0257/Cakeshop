<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cake Details - CakeCraft</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 768px) { .product-layout { grid-template-columns: 1fr; gap: 24px; } }
    .product-image {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .product-image img {
      width: 100%;
      height: 420px;
      object-fit: cover;
    }
    .product-info h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .product-info .category-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 9999px;
      background: rgba(208,184,168,0.2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }
    .product-info .description {
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .product-info .price-section {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 24px;
    }
    .product-info .price {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      font-family: var(--font-body);
    }
    .product-info .price-note {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .flavors {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .flavor-chip {
      padding: 6px 14px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--primary-hover); }
    .back-link svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <section class="section">
    <a href="/" class="back-link" data-testid="back-to-shop">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Back to Shop
    </a>

    <div id="loading"><div class="spinner"></div></div>

    <div class="product-layout hidden" id="product-content" data-testid="product-detail">
      <div class="product-image">
        <img id="cake-image" src="" alt="">
      </div>
      <div class="product-info">
        <h1 id="cake-name"></h1>
        <span class="category-badge" id="cake-category"></span>
        <p class="description" id="cake-description"></p>
        <div class="price-section">
          <span class="price" id="cake-price"></span>
          <span class="price-note" id="price-note">for 500g</span>
        </div>
        <div id="stock-status" style="margin-bottom:20px"></div>
        <div id="flavors-container" style="margin-bottom:20px">
          <p style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)">Available Flavors</p>
          <div class="flavors" id="flavors-list"></div>
        </div>

        <!-- Add to Cart Section -->
        <div id="cart-section" class="hidden" style="border-top:1px solid var(--border);padding-top:20px">
          <div class="form-row" style="margin-bottom:14px">
            <div class="form-group" style="margin-bottom:0">
              <label for="weight-select">Weight</label>
              <select id="weight-select" class="form-input" data-testid="weight-select">
                <option value="500g">500g (1x)</option>
                <option value="1kg">1 Kg (2x)</option>
                <option value="1.5kg">1.5 Kg (3x)</option>
                <option value="2kg">2 Kg (4x)</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label for="flavor-select">Flavor</label>
              <select id="flavor-select" class="form-input" data-testid="flavor-select"></select>
            </div>
          </div>
          <div class="form-group">
            <label for="delivery-date">Delivery Date</label>
            <input type="date" id="delivery-date" class="form-input" data-testid="delivery-date">
          </div>
          <div class="form-group">
            <label for="cake-message">Message on Cake (optional)</label>
            <input type="text" id="cake-message" class="form-input" placeholder="e.g., Happy Birthday!" data-testid="cake-message">
          </div>
          <button class="btn btn-primary btn-full" onclick="addToCart()" id="add-cart-btn" data-testid="add-to-cart-button">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    let currentCake = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuthStatus();
      buildNavbar('navbar');

      const params = new URLSearchParams(window.location.search);
      const cakeId = params.get('id');
      if (!cakeId) {
        showToast('No cake specified', 'error');
        window.location.href = '/';
        return;
      }

      // Set min delivery date to tomorrow
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      document.getElementById('delivery-date').min = tomorrow.toISOString().split('T')[0];
      document.getElementById('delivery-date').value = tomorrow.toISOString().split('T')[0];

      // Update price on weight change
      document.getElementById('weight-select').addEventListener('change', updateDisplayPrice);

      await loadCake(cakeId);
    });

    function updateDisplayPrice() {
      if (!currentCake) return;
      const mult = { '500g': 1, '1kg': 2, '1.5kg': 3, '2kg': 4 };
      const w = document.getElementById('weight-select').value;
      const price = currentCake.base_price * (mult[w] || 1);
      document.getElementById('cake-price').textContent = '\u20B9' + price;
      document.getElementById('price-note').textContent = 'for ' + w;
    }

    async function loadCake(cakeId) {
      try {
        currentCake = await apiCall(`/cakes/${cakeId}`);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('product-content').classList.remove('hidden');

        document.getElementById('cake-image').src = currentCake.image_url;
        document.getElementById('cake-image').alt = currentCake.name;
        document.getElementById('cake-name').textContent = currentCake.name;
        document.getElementById('cake-category').textContent = currentCake.category;
        document.getElementById('cake-description').textContent = currentCake.description;
        document.getElementById('cake-price').textContent = '\u20B9' + currentCake.base_price;
        document.title = `${currentCake.name} - CakeCraft`;

        const statusEl = document.getElementById('stock-status');
        if (currentCake.in_stock) {
          statusEl.innerHTML = '<span class="stock-badge in-stock">In Stock</span>';
          document.getElementById('cart-section').classList.remove('hidden');
        } else {
          statusEl.innerHTML = '<span class="stock-badge out-of-stock">Out of Stock</span>';
        }

        const flavorsList = document.getElementById('flavors-list');
        const flavorSelect = document.getElementById('flavor-select');
        if (currentCake.flavors && currentCake.flavors.length) {
          flavorsList.innerHTML = currentCake.flavors.map(f => `<span class="flavor-chip">${f}</span>`).join('');
          flavorSelect.innerHTML = currentCake.flavors.map(f => `<option value="${f}">${f}</option>`).join('');
        } else {
          document.getElementById('flavors-container').classList.add('hidden');
          flavorSelect.innerHTML = '<option value="Classic">Classic</option>';
        }
      } catch (err) {
        showToast('Cake not found', 'error');
        setTimeout(() => { window.location.href = '/'; }, 1000);
      }
    }

    async function addToCart() {
      if (!getUser()) { window.location.href = '/login.html'; return; }
      if (!currentCake) return;

      const btn = document.getElementById('add-cart-btn');
      const deliveryDate = document.getElementById('delivery-date').value;
      if (!deliveryDate) { showToast('Please select a delivery date', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Adding...';

      try {
        await apiCall('/cart', {
          method: 'POST',
          body: {
            cake_id: currentCake.cake_id,
            weight: document.getElementById('weight-select').value,
            flavor: document.getElementById('flavor-select').value,
            message: document.getElementById('cake-message').value,
            delivery_date: deliveryDate,
            quantity: 1
          }
        });
        showToast('Added to cart!', 'success');
        btn.textContent = 'Added!';
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Add to Cart'; }, 1500);
      } catch(e) {
        showToast(e.message || 'Failed to add to cart', 'error');
        btn.disabled = false;
        btn.textContent = 'Add to Cart';
      }
    }
  </script>
</body>
</html>
