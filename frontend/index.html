<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CakeCraft - Handcrafted Cakes</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="navbar"></div>

  <!-- Hero Section -->
  <section class="hero" data-testid="hero-section">
    <div class="hero-content">
      <h1 data-testid="hero-heading">Handcrafted Cakes<br>Made with Love</h1>
      <p>Premium cakes for every celebration. Customize your perfect cake with our selection of flavors, sizes, and designs.</p>
      <button class="btn btn-primary" onclick="document.getElementById('cakes-section').scrollIntoView({behavior:'smooth'})" data-testid="explore-cakes-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Explore Cakes
      </button>
    </div>
  </section>

  <!-- Search & Filter + Cakes -->
  <section class="section" id="cakes-section">
    <div class="filter-bar" data-testid="filter-bar">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="form-input" placeholder="Search cakes..." id="search-input" data-testid="search-input">
      </div>
      <div class="category-btns" id="category-btns" data-testid="category-buttons"></div>
    </div>

    <!-- Loading -->
    <div id="loading-state">
      <div class="cakes-grid">
        <div><div class="skeleton" style="height:240px;margin-bottom:12px"></div><div class="skeleton" style="height:18px;width:75%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:50%"></div></div>
        <div><div class="skeleton" style="height:240px;margin-bottom:12px"></div><div class="skeleton" style="height:18px;width:75%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:50%"></div></div>
        <div><div class="skeleton" style="height:240px;margin-bottom:12px"></div><div class="skeleton" style="height:18px;width:75%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:50%"></div></div>
        <div><div class="skeleton" style="height:240px;margin-bottom:12px"></div><div class="skeleton" style="height:18px;width:75%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:50%"></div></div>
      </div>
    </div>

    <!-- Cakes Grid -->
    <div class="cakes-grid hidden" id="cakes-grid" data-testid="cakes-grid"></div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="empty-state" data-testid="empty-state">
      No cakes found. Try a different search or filter.
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    let allCakes = [];
    let currentCategory = 'all';
    const categories = ['all', 'Chocolate', 'Fruit', 'Classic', 'Cheesecake', 'Special'];

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuthStatus();
      buildNavbar('navbar');
      renderCategories();
      await fetchCakes();

      document.getElementById('search-input').addEventListener('input', filterCakes);
    });

    function renderCategories() {
      const container = document.getElementById('category-btns');
      container.innerHTML = categories.map(cat =>
        `<button class="category-btn ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')" data-testid="category-${cat}-button">${cat}</button>`
      ).join('');
    }

    function setCategory(cat) {
      currentCategory = cat;
      renderCategories();
      filterCakes();
    }

    async function fetchCakes() {
      try {
        allCakes = await apiCall('/cakes');
        document.getElementById('loading-state').classList.add('hidden');
        filterCakes();
      } catch (err) {
        showToast('Failed to load cakes', 'error');
        document.getElementById('loading-state').classList.add('hidden');
      }
    }

    function filterCakes() {
      const search = document.getElementById('search-input').value.toLowerCase();
      let filtered = allCakes;

      if (search) {
        filtered = filtered.filter(c =>
          c.name.toLowerCase().includes(search) || c.description.toLowerCase().includes(search)
        );
      }
      if (currentCategory !== 'all') {
        filtered = filtered.filter(c => c.category === currentCategory);
      }

      renderCakes(filtered);
    }

    function renderCakes(cakes) {
      const grid = document.getElementById('cakes-grid');
      const empty = document.getElementById('empty-state');

      if (cakes.length === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      grid.classList.remove('hidden');

      grid.innerHTML = cakes.map(cake => `
        <a href="/product-detail.html?id=${cake.cake_id}" class="cake-card" data-testid="cake-card-${cake.cake_id}">
          <div class="cake-card-img">
            <img src="${cake.image_url}" alt="${cake.name}" loading="lazy">
          </div>
          <div class="cake-card-body">
            <div class="cake-card-header">
              <h3>${cake.name}</h3>
            </div>
            <p class="cake-card-desc">${cake.description}</p>
            <div class="cake-card-footer">
              <span class="cake-price">${'\u20B9'}${cake.base_price}</span>
              ${cake.in_stock
                ? '<span class="stock-badge in-stock">In Stock</span>'
                : '<span class="stock-badge out-of-stock">Out of Stock</span>'}
            </div>
          </div>
        </a>
      `).join('');
    }
  </script>
</body>
</html>
