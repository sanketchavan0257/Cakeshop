<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders - CakeCraft Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }
    .order-id {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .order-date {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .order-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .order-status.pending { background: rgba(208,184,168,0.2); color: var(--primary-hover); }
    .order-status.confirmed { background: rgba(129,178,154,0.15); color: var(--success); }
    .order-status.delivered { background: rgba(129,178,154,0.25); color: #4a8b6f; }
    .order-status.cancelled { background: rgba(224,122,95,0.15); color: var(--error); }
    .order-customer {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .order-detail {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .order-amount {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      font-family: var(--font-body);
    }
    .order-items-list {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 4px 0;
    }
    .order-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .order-actions .btn { font-size: 12px; padding: 6px 14px; }
    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .summary-row .stat-card { flex: 1; min-width: 140px; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <section class="section">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <a href="/admin.html" style="color:var(--primary);display:flex;align-items:center;gap:4px;font-size:14px">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Back to Dashboard
      </a>
    </div>
    <h1 class="section-title" data-testid="admin-orders-heading">Manage Orders</h1>
    <p class="section-subtitle">View and manage customer orders</p>

    <div class="summary-row" id="order-stats"></div>

    <div id="loading"><div class="spinner"></div></div>
    <div id="orders-list" class="hidden" data-testid="orders-list"></div>
    <div class="empty-state hidden" id="empty-state" data-testid="empty-orders">No orders yet</div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    let allOrders = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user || user.role !== 'admin') {
        showToast('Admin access required', 'error');
        window.location.href = '/login.html';
        return;
      }
      buildNavbar('navbar');
      await loadOrders();
    });

    async function loadOrders() {
      try {
        allOrders = await apiCall('/admin/orders');
        document.getElementById('loading').classList.add('hidden');
        renderStats();
        renderOrders();
      } catch (err) {
        showToast('Failed to load orders', 'error');
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function renderStats() {
      const pending = allOrders.filter(o => o.order_status === 'pending' || o.status === 'pending').length;
      const total = allOrders.reduce((s, o) => s + (o.total_amount || 0), 0);
      document.getElementById('order-stats').innerHTML = `
        <div class="stat-card">
          <p class="stat-value">${allOrders.length}</p>
          <p class="stat-label">Total Orders</p>
        </div>
        <div class="stat-card">
          <p class="stat-value" style="color:var(--primary)">${pending}</p>
          <p class="stat-label">Pending</p>
        </div>
        <div class="stat-card">
          <p class="stat-value">${'\u20B9'}${total.toLocaleString()}</p>
          <p class="stat-label">Revenue</p>
        </div>
      `;
    }

    function renderOrders() {
      const list = document.getElementById('orders-list');
      const empty = document.getElementById('empty-state');

      if (allOrders.length === 0) {
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      list.classList.remove('hidden');

      list.innerHTML = allOrders.map(order => {
        const status = order.order_status || order.status || 'pending';
        const date = order.created_at ? new Date(order.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
        const items = order.items || [];
        const address = order.address?.full_address || '';

        return `
          <div class="order-card" data-testid="order-${order.order_id}">
            <div class="order-header">
              <div>
                <div class="order-id">Order #${(order.order_id || '').slice(0, 8)}...</div>
                <div class="order-customer">${order.user_name || 'Customer'}</div>
                <div class="order-detail">${order.user_email || ''} ${order.user_mobile ? '| ' + order.user_mobile : ''}</div>
                ${address ? `<div class="order-detail">${address}</div>` : ''}
              </div>
              <div style="text-align:right">
                <span class="order-status ${status}">${status}</span>
                <div class="order-date" style="margin-top:6px">${date}</div>
                <div class="order-amount" style="margin-top:4px">${'\u20B9'}${order.total_amount || 0}</div>
              </div>
            </div>
            ${items.length ? `
              <div class="order-items-list">
                ${items.map(item => `
                  <div class="order-item">
                    <span>${item.cake_name || item.name || 'Cake'} (${item.weight || ''} ${item.flavor || ''})</span>
                    <span>x${item.quantity || 1}</span>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <div class="order-actions">
              <button class="btn btn-outline" onclick="deleteOrder('${order.order_id}')" data-testid="delete-order-${order.order_id}">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function deleteOrder(orderId) {
      if (!confirm('Delete this order?')) return;
      try {
        await apiCall('/admin/orders/' + orderId, { method: 'DELETE' });
        allOrders = allOrders.filter(o => o.order_id !== orderId);
        renderStats();
        renderOrders();
        showToast('Order deleted', 'success');
      } catch (err) {
        showToast('Failed to delete order', 'error');
      }
    }
  </script>
</body>
</html>
