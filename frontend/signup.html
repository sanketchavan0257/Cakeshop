<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CakeCraft</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="animation: fadeUp 0.5s ease-out">
      <a href="/" class="logo" data-testid="logo-link">CakeCraft</a>
      <p class="subtitle">Create your account to start ordering</p>

      <form id="signup-form" data-testid="register-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" class="form-input" required data-testid="name-input" placeholder="Your full name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" required data-testid="email-input" placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" required minlength="6" data-testid="password-input" placeholder="Min 6 characters">
            <button type="button" class="password-toggle" onclick="togglePassword()" data-testid="toggle-password-visibility">
              <span id="eye-icon"></span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn" data-testid="register-submit-button">
          Sign Up
        </button>
      </form>

      <p class="footer-text">
        Already have an account? <a href="/login.html" data-testid="login-link">Login</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let showPassword = false;

    document.addEventListener('DOMContentLoaded', () => {
      updateEyeIcon();

      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (password.length < 6) {
          showToast('Password must be at least 6 characters', 'error');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
          const data = await apiCall('/auth/register', {
            method: 'POST',
            body: { name, email, password },
          });
          saveAuth(data);
          showToast('Account created successfully!', 'success');
          setTimeout(() => { window.location.href = '/'; }, 500);
        } catch (err) {
          showToast(err.message || 'Failed to create account', 'error');
          btn.disabled = false;
          btn.textContent = 'Sign Up';
        }
      });
    });

    function togglePassword() {
      showPassword = !showPassword;
      document.getElementById('password').type = showPassword ? 'text' : 'password';
      updateEyeIcon();
    }

    function updateEyeIcon() {
      document.getElementById('eye-icon').innerHTML = showPassword ? Icons.eyeOff : Icons.eye;
    }
  </script>
</body>
</html>
