<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - CakeCraft</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
    .order-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:12px}
    .order-id{font-size:12px;color:var(--text-secondary);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
    .order-date{font-size:12px;color:var(--text-secondary);margin-top:4px}
    .status-badge{display:inline-block;padding:4px 12px;border-radius:9999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
    .status-badge.pending{background:rgba(208,184,168,.2);color:var(--primary-hover)}
    .status-badge.confirmed{background:rgba(129,178,154,.15);color:var(--success)}
    .status-badge.delivered{background:rgba(129,178,154,.3);color:#3d7a5c}
    .status-badge.cancelled{background:rgba(224,122,95,.15);color:var(--error)}
    .order-amount{font-size:1.2rem;font-weight:700;color:var(--primary);font-family:var(--font-body);margin-top:4px}
    .order-address{font-size:13px;color:var(--text-secondary);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
    .order-items-list{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
    .order-item{display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);padding:4px 0}
    .payment-info{margin-top:10px;font-size:12px;color:var(--text-secondary);display:flex;gap:16px}
    .payment-info span{display:inline-flex;align-items:center;gap:4px}
  </style>
</head>
<body>
  <div id="navbar"></div>
  <section class="section">
    <h1 class="section-title" data-testid="orders-heading">My Orders</h1>
    <p class="section-subtitle" id="orders-subtitle">Loading your orders...</p>

    <div id="loading"><div class="spinner"></div></div>
    <div id="orders-list" class="hidden" data-testid="orders-list"></div>
    <div class="empty-state hidden" id="empty-state" data-testid="empty-orders">
      <p style="margin-bottom:16px">You haven't placed any orders yet</p>
      <a href="/" class="btn btn-primary" data-testid="browse-cakes-link">Browse Cakes</a>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkAuthStatus();
      if (!user) { window.location.href='/login.html'; return; }
      buildNavbar('navbar');
      await loadOrders();
    });

    async function loadOrders() {
      try {
        const orders = await apiCall('/orders');
        document.getElementById('loading').classList.add('hidden');
        const subtitle = document.getElementById('orders-subtitle');

        if (!orders.length) {
          subtitle.textContent = '';
          document.getElementById('empty-state').classList.remove('hidden');
          return;
        }

        subtitle.textContent = `${orders.length} order${orders.length>1?'s':''}`;
        document.getElementById('orders-list').classList.remove('hidden');

        document.getElementById('orders-list').innerHTML = orders.map(order => {
          const st = order.order_status || order.status || 'pending';
          const date = order.created_at ? new Date(order.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
          const items = order.items || [];
          const addr = order.address?.full_address || '';

          return `
            <div class="order-card" data-testid="order-${order.order_id}">
              <div class="order-header">
                <div>
                  <div class="order-id">Order #${(order.order_id||'').slice(0,8)}</div>
                  <div class="order-date">${date}</div>
                </div>
                <div style="text-align:right">
                  <span class="status-badge ${st}">${st}</span>
                  <div class="order-amount">${'\u20B9'}${order.total_amount||0}</div>
                </div>
              </div>
              ${items.length ? `<div class="order-items-list">${items.map(i=>
                `<div class="order-item"><span>${i.cake_name||i.name||'Cake'} ${i.weight?'('+i.weight+')':''} ${i.flavor||''}</span><span>x${i.quantity||1} - ${'\u20B9'}${i.price||0}</span></div>`
              ).join('')}</div>` : ''}
              ${addr ? `<div class="order-address">${addr}</div>` : ''}
              <div class="payment-info">
                <span>Payment: ${order.payment_method||'COD'}</span>
                <span>Status: ${order.payment_status||'Pending'}</span>
              </div>
            </div>
          `;
        }).join('');
      } catch(e) {
        showToast('Failed to load orders','error');
        document.getElementById('loading').classList.add('hidden');
      }
    }
  </script>
</body>
</html>
