<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CakeCraft</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="animation: fadeUp 0.5s ease-out">
      <a href="/" class="logo" data-testid="logo-link">CakeCraft</a>
      <p class="subtitle">Welcome back! Please login to your account.</p>

      <form id="login-form" data-testid="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" required data-testid="email-input" placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" required data-testid="password-input" placeholder="Enter your password">
            <button type="button" class="password-toggle" onclick="togglePassword()" data-testid="toggle-password-visibility">
              <span id="eye-icon"></span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn" data-testid="login-submit-button">
          Login
        </button>

        <div class="text-center" style="margin-top:14px">
          <a href="/forgot-password.html" style="color:var(--primary);font-size:14px" data-testid="forgot-password-link">Forgot Password?</a>
        </div>
      </form>

      <p class="footer-text">
        Don't have an account? <a href="/signup.html" data-testid="register-link">Sign up</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let showPassword = false;

    document.addEventListener('DOMContentLoaded', () => {
      updateEyeIcon();

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
          const data = await apiCall('/auth/login', {
            method: 'POST',
            body: { email, password },
          });
          saveAuth(data);
          showToast('Welcome back!', 'success');
          setTimeout(() => {
            window.location.href = data.role === 'admin' ? '/admin.html' : '/';
          }, 500);
        } catch (err) {
          showToast(err.message || 'Invalid credentials', 'error');
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      });
    });

    function togglePassword() {
      showPassword = !showPassword;
      document.getElementById('password').type = showPassword ? 'text' : 'password';
      updateEyeIcon();
    }

    function updateEyeIcon() {
      document.getElementById('eye-icon').innerHTML = showPassword ? Icons.eyeOff : Icons.eye;
    }
  </script>
</body>
</html>
